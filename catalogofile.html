<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loja | Catálogo</title>
  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #25D366;
      --primary-dark: #128C7E;
      --bg: #f7f7f8;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --badge: #ff6b6b;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--primary); }
    .cart-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .cart-btn:hover { background: var(--primary-dark); }
    #cart-count {
      background: var(--badge);
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 0.7rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── HERO ─── */
    .hero {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 60px 24px;
    }
    .hero h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; }
    .hero p { font-size: 1.1rem; opacity: 0.9; }

    /* ─── FILTROS ─── */
    .filters {
      display: flex;
      gap: 10px;
      padding: 20px 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: white;
      border: 2px solid #e5e7eb;
      padding: 8px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }

    /* ─── GRID DE PRODUTOS ─── */
    .catalog {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      padding: 0 24px 40px;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.13); }
    .card-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--badge);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px;
      z-index: 1;
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }
    .card-body { padding: 16px; }
    .card-category {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .card-desc { font-size: 0.83rem; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .price { font-size: 1.15rem; font-weight: 800; color: var(--text); }
    .price .old { font-size: 0.8rem; color: var(--muted); text-decoration: line-through; margin-right: 6px; font-weight: 400; }
    .add-btn {
      background: var(--text);
      color: white;
      border: none;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .add-btn:hover { background: var(--primary-dark); }

    /* ─── MODAL PRODUTO ─── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: var(--radius);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
      animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal img { width: 100%; height: 240px; object-fit: cover; }
    .modal-body { padding: 24px; }
    .modal-body h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
    .modal-body p { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .modal-price { font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .qty-control button {
      background: var(--bg);
      border: none;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      font-weight: 700;
    }
    .qty-control span { font-size: 1.1rem; font-weight: 700; min-width: 24px; text-align: center; }
    .wpp-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .wpp-btn:hover { background: var(--primary-dark); }
    .close-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      z-index: 201;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── CARRINHO LATERAL ─── */
    .cart-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
    }
    .cart-overlay.open { display: block; }
    .cart-panel {
      position: fixed;
      top: 0; right: -420px;
      width: 380px; max-width: 100vw;
      height: 100vh;
      background: white;
      z-index: 301;
      display: flex;
      flex-direction: column;
      transition: right 0.3s ease;
      box-shadow: -4px 0 30px rgba(0,0,0,0.15);
    }
    .cart-panel.open { right: 0; }
    .cart-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 800;
      font-size: 1.1rem;
    }
    .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .cart-item img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-info strong { font-size: 0.9rem; display: block; }
    .cart-item-info span { font-size: 0.8rem; color: var(--muted); }
    .remove-item { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; }
    .cart-footer { padding: 20px 24px; border-top: 1px solid #e5e7eb; }
    .cart-total { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.1rem; margin-bottom: 16px; }
    .empty-cart { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.95rem; }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid #e5e7eb;
    }

    @media (max-width: 500px) {
      .hero h1 { font-size: 1.6rem; }
      .catalog { padding: 0 12px 40px; }
      .filters { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">minha<span>loja</span></div>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Carrinho <span id="cart-count">0</span>
  </button>
</header>

<!-- ── HERO ── -->
<section class="hero">
  <h1>✨ Produtos Selecionados</h1>
  <p>Escolha o que você quer e finalize direto no WhatsApp!</p>
</section>

<!-- ── FILTROS ── -->
<div class="filters">
  <button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>
  <button class="filter-btn" onclick="filterProducts('vestuario', this)">👕 Vestuário</button>
  <button class="filter-btn" onclick="filterProducts('acessorios', this)">💍 Acessórios</button>
  <button class="filter-btn" onclick="filterProducts('beleza', this)">💄 Beleza</button>
  <button class="filter-btn" onclick="filterProducts('casa', this)">🏠 Casa</button>
</div>

<!-- ── CATÁLOGO ── -->
<div class="catalog" id="catalog"></div>

<!-- ── MODAL PRODUTO ── -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <img id="m-img" src="" alt=""/>
    <div class="modal-body">
      <div class="card-category" id="m-cat"></div>
      <h2 id="m-name"></h2>
      <p id="m-desc"></p>
      <div class="modal-price" id="m-price"></div>
      <div class="qty-control">
        <button onclick="changeQty(-1)">−</button>
        <span id="qty-val">1</span>
        <button onclick="changeQty(1)">+</button>
      </div>
      <button class="wpp-btn" onclick="checkoutWhatsApp()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.523 5.845L0 24l6.335-1.502A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.371l-.36-.214-3.727.883.898-3.638-.234-.373A9.818 9.818 0 1112 21.818z"/>
        </svg>
        Finalizar no WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- ── CARRINHO LATERAL ── -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    🛒 Seu Carrinho
    <button style="background:none;border:none;cursor:pointer;font-size:1.3rem" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total-val">R$ 0,00</span>
    </div>
    <button class="wpp-btn" onclick="checkoutCartWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.117 1.523 5.845L0 24l6.335-1.502A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.371l-.36-.214-3.727.883.898-3.638-.234-.373A9.818 9.818 0 1112 21.818z"/>
      </svg>
      Pedir Tudo pelo WhatsApp
    </button>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer>
  Feito com ❤️ · Atendimento via WhatsApp · minhalojaexemplo.com.br
</footer>

<script>
  // ══════════════════════════════════════════
  // ⚙️ CONFIGURAÇÕES — EDITE AQUI!
  // ══════════════════════════════════════════
  const WHATSAPP_NUMBER = "5585999999999"; // ← SEU NÚMERO (com código do país)
  const STORE_NAME = "Minha Loja";

  // ══════════════════════════════════════════
  // 🛍️ PRODUTOS — EDITE OU ADICIONE MAIS!
  // ══════════════════════════════════════════
  const products = [
    {
      id: 1,
      name: "Camiseta Aesthetic",
      category: "vestuario",
      desc: "100% algodão premium, modelagem oversized. Disponível em P, M, G e GG.",
      price: 89.90,
      oldPrice: 120.00,
      badge: "🔥 Mais vendido",
      img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500&q=80"
    },
    {
      id: 2,
      name: "Bolsa Transversal Mini",
      category: "acessorios",
      desc: "Couro sintético de alta qualidade. Alça ajustável. Várias cores disponíveis.",
      price: 149.90,
      oldPrice: null,
      badge: "✨ Novo",
      img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500&q=80"
    },
    {
      id: 3,
      name: "Kit Skincare Completo",
      category: "beleza",
      desc: "Sérum + hidratante + protetor solar. Para todos os tipos de pele.",
      price: 219.90,
      oldPrice: 280.00,
      badge: "💸 Oferta",
      img: "https://images.unsplash.com/photo-1556228578-8c89e6adf883?w=500&q=80"
    },
    {
      id: 4,
      name: "Vela Aromática Soy",
      category: "casa",
      desc: "Cera de soja natural, 50h de duração. Fragrâncias: lavanda, baunilha ou jasmim.",
      price: 59.90,
      oldPrice: null,
      badge: null,
      img: "https://images.unsplash.com/photo-1602178713558-c9e469b5cdcb?w=500&q=80"
    },
    {
      id: 5,
      name: "Tênis Chunky Retrô",
      category: "vestuario",
      desc: "Solado robusto super confortável. Numeração 34 a 43.",
      price: 329.90,
      oldPrice: 420.00,
      badge: "🔥 Hot",
      img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80"
    },
    {
      id: 6,
      name: "Óculos de Sol Retrô",
      category: "acessorios",
      desc: "Armação acetato, lente com proteção UV400. Estojo incluso.",
      price: 129.90,
      oldPrice: null,
      badge: "✨ Novo",
      img: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500&q=80"
    }
  ];

  // ══════════════════════════════════════════
  // 🧠 LÓGICA
  // ══════════════════════════════════════════
  let cart = [];
  let currentProduct = null;
  let currentQty = 1;

  function formatPrice(val) {
    return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function renderCatalog(filter = 'todos') {
    const container = document.getElementById('catalog');
    const filtered = filter === 'todos' ? products : products.filter(p => p.category === filter);
    container.innerHTML = filtered.map(p => `
      <div class="card" onclick="openModal(${p.id})">
        ${p.badge ? `<div class="card-badge">${p.badge}</div>` : ''}
        <img src="${p.img}" alt="${p.name}" loading="lazy"/>
        <div class="card-body">
          <div class="card-category">${p.category}</div>
          <div class="card-title">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-footer">
            <div class="price">
              ${p.oldPrice ? `<span class="old">${formatPrice(p.oldPrice)}</span>` : ''}
              ${formatPrice(p.price)}
            </div>
            <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">+</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function filterProducts(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCatalog(cat);
  }

  // Modal
  function openModal(id) {
    const p = products.find(x => x.id === id);
    currentProduct = p;
    currentQty = 1;
    document.getElementById('m-img').src   = p.img;
    document.getElementById('m-cat').textContent  = p.category.toUpperCase();
    document.getElementById('m-name').textContent = p.name;
    document.getElementById('m-desc').textContent = p.desc;
    document.getElementById('m-price').innerHTML  =
      (p.oldPrice ? `<span style="font-size:0.9rem;color:#6b7280;text-decoration:line-through;margin-right:8px">${formatPrice(p.oldPrice)}</span>` : '')
      + formatPrice(p.price);
    document.getElementById('qty-val').textContent = 1;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal') && !e.target.classList.contains('close-btn')) return;
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function changeQty(delta) {
    currentQty = Math.max(1, currentQty + delta);
    document.getElementById('qty-val').textContent = currentQty;
  }

  // Checkout direto (modal)
  function checkoutWhatsApp() {
    const p = currentProduct;
    const total = formatPrice(p.price * currentQty);
    const msg = `Olá! Gostaria de comprar pelo *${STORE_NAME}*:%0A%0A`
      + `🛍️ *${p.name}*%0A`
      + `📦 Quantidade: ${currentQty}%0A`
      + `💰 Total: ${total}%0A%0A`
      + `Aguardo informações sobre pagamento e entrega! 😊`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
  }

  // Carrinho
  function addToCart(id) {
    const p = products.find(x => x.id === id);
    const existing = cart.find(x => x.id === id);
    if (existing) existing.qty++;
    else cart.push({ ...p, qty: 1 });
    updateCartUI();
    showToast(`✅ ${p.name} adicionado!`);
  }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    updateCartUI();
  }

  function updateCartUI() {
    const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
    document.getElementById('cart-count').textContent = cart.reduce((s, x) => s + x.qty, 0);
    document.getElementById('cart-total-val').textContent = formatPrice(total);
    const list = document.getElementById('cart-items-list');
    if (cart.length === 0) {
      list.innerHTML = `<div class="empty-cart">🛒<br><br>Seu carrinho está vazio.<br>Adicione produtos clicando em <strong>+</strong></div>`;
      return;
    }
    list.innerHTML = cart.map(x => `
      <div class="cart-item">
        <img src="${x.img}" alt="${x.name}"/>
        <div class="cart-item-info">
          <strong>${x.name}</strong>
          <span>${x.qty}x · ${formatPrice(x.price * x.qty)}</span>
        </div>
        <button class="remove-item" onclick="removeFromCart(${x.id})">🗑️</button>
      </div>
    `).join('');
  }

  function toggleCart() {
    document.getElementById('cart-overlay').classList.toggle('open');
    document.getElementById('cart-panel').classList.toggle('open');
  }

  // Checkout do carrinho completo
  function checkoutCartWhatsApp() {
    if (cart.length === 0) { alert('Adicione produtos antes!'); return; }
    const items = cart.map(x => `• ${x.name} x${x.qty} = ${formatPrice(x.price * x.qty)}`).join('%0A');
    const total = formatPrice(cart.reduce((s, x) => s + x.price * x.qty, 0));
    const msg = `Olá! Quero fazer um pedido no *${STORE_NAME}*:%0A%0A`
      + `🛍️ *Meu pedido:*%0A${items}%0A%0A`
      + `💰 *Total: ${total}*%0A%0A`
      + `Aguardo as instruções de pagamento e entrega! 😊`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
  }

  // Toast
  function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    Object.assign(t.style, {
      position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
      background:'#1a1a2e', color:'white', padding:'10px 20px',
      borderRadius:'50px', fontSize:'0.85rem', zIndex:'999',
      boxShadow:'0 4px 16px rgba(0,0,0,0.2)', animation:'none'
    });
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  // ── INIT ──
  renderCatalog();
  updateCartUI();
</script>
</body>
</html>
